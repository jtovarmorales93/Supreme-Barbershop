
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barbearia Nilson</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="preload" as="image" href="assets/img/fondo-barberia.webp"> <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
           background-color:rgb(40, 40, 40);
        background-image: url('assets/img/fondo-barberia.webp');
            background-size: cover;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* Overlay elegante */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(
                    to bottom,
                    rgba(0, 0, 0, 0.55),
                    rgba(0, 0, 0, 0.548),
                    rgba(0, 0, 0, 0.514)
                );
            z-index: 0;
        }

        

        header,
        main,
        footer {
            position: relative;
            z-index: 1;
        }

        /* HEADER */
        header {
            text-align: center;
            padding: 25px 20px;
            top: 20px;
        }

        header h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            font-weight: 700;
            letter-spacing: 2px;

  background: linear-gradient(
                135deg,
                #4e3f1f 0%,
                #5a5843 25%,
                #f1d58c 50%,
                #846c3b 75%,
                #aa771c 100%
            );

            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;

            background-size: 200% auto;
            animation: brilhoMetalico 8s linear infinite;

            text-shadow:
                0 4px 10px rgba(0, 0, 0, .8),
                0 0 25px rgba(218, 165, 32, .25);

          
        }

        @keyframes brilhoMetalico {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        header p {
            margin-top: 18px;
            font-size: 1rem;
            color: #e4e4e4d4;
            font-weight: 300;
        }

        /* CONTEÚDO PRINCIPAL */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            top: 55px;
        }

        .card-apresentacao {
            width: 100%;
            max-width: 850px;

            text-align: center;

            display: flex;
            flex-direction: column;
            align-items: center;
        
            padding: 40px;

            text-shadow:
                0 3px 10px rgba(0, 0, 0, 0.733);

            animation: fadeUp 1s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h2{
      
        color: rgb(212, 212, 212);
        
        z-index: 10;        
        
        }


/* El contenedor fija el texto en el lugar exacto de tu imagen */
.contenedor-posicion {
    width: 100%;
    display: flex;
    justify-content: center;
    
    /* CONTROLADOR DE POSICIÓN: Ajusta este % si quieres moverlo más arriba o abajo */
    margin-top: 6vh; /* Se adapta al alto de cualquier pantalla de celular o PC */
}

/* El h2 se adapta de tamaño para nunca desacomodarse */
.contenedor-posicion h2 {
    width: 90%;
    max-width: 800px;
    text-align: center;
    margin: 0;
    
    /* TAMAÑO RESPONSIVO: Se encoge en celulares y crece en monitores solo */
    font-size: clamp(2.2rem, 5vw, 4rem); 
}

        

        /* TEXTO */
        .card-apresentacao p {
            max-width: 650px;

            font-size: 1.05rem;
            font-weight: 300;

            line-height: 1.9;

            color: rgba(255, 255, 255, 0.9);

            margin-bottom: 30px;
        }

        /* BOTÃO */
        .btn {
            display: inline-block;

            text-decoration: none;

            background: linear-gradient(
                135deg,
                #d4af37f7,
                #f7d674
            );

            color: #000;

            padding: 16px 38px;

            border-radius: 8px;

            font-size: 1rem;
            font-weight: 600;

            transition: .3s ease;
        }

        .btn:hover {
            transform: translateY(-4px);

            box-shadow:
                0 10px 30px rgba(212, 175, 55, .45);
        }

        /* FOOTER */
        footer {
            text-align: center;
            padding: 20px;
            color: #d0d0d0;
            font-size: .9rem;
            font-weight: 300;
        }

        /* TABLETS */
        @media (max-width: 768px) {

            header {
                padding: 20px 15px;
            }

            .card-apresentacao  {
                font-size: 2.3rem;
            }

           h2{
         
             font-size: 2.3rem;
            }
        

            .card-apresentacao p {
                font-size: .95rem;
                line-height: 1.8;
            }

            .btn {
                width: 100%;
                max-width: 280px;
            }
        }

        /* CELULARES */
        @media (max-width: 480px) {

            .card-apresentacao h2 {
                font-size: 1.9rem;
            }

            .card-apresentacao p {
                font-size: .92rem;
            }

            header p {
                font-size: .9rem;
            }
        }
    </style>
</head>

<body>

   

    <header>
        <h1>Barbearia Nilson</h1>
        <p>Agende seu horário em poucos cliques</p>
    </header>

   <div class="contenedor-posicion">
    <h2>Tradição, estilo e personalidade</h2>
</div>

    <main>

        <div class="card-apresentacao">

           

            <p>
                Cortes modernos, atendimento profissional e qualidade em cada detalhe. Valorize seu estilo na Barbearia Nilson.
            </p>

            <a href="index-agendamento.html" class="btn">
                Agendar horário
            </a>

        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        © 2026 Barbearia Nilson. Todos os direitos reservados.
    </footer>

</body>

</html>
