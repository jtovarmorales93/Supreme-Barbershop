<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #1a1a1a, #0d0d0d);
            padding: 20px;
        }

        /* CONTENEDOR PRINCIPAL */
        .login-box {
            width: 100%;
            max-width: 380px;
            background: #1e1e1e;
            padding: 35px 25px;
            border-radius: 18px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.568);
            text-align: center;
        }

        /* TÍTULO CENTRADO */
        .login-box h1 {
            font-size: 24px;
            color: #f5c542;
            margin-bottom: 8px;
            text-align: center;
        }

        .subtitle {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 25px;
            text-align: center;
        }

        /* INPUTS */
        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 12px;
            border: 1px solid transparent;
            background: #2b2b2b;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border: 1px solid #f5c542;
            background: #333;
        }

        /* BOTÓN */
        button {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: #f5c542;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover {
            background: #e0b935;
        }

        /* 📱 RESPONSIVO EXTRA */
        @media (max-width: 400px) {
            .login-box {
                padding: 25px 18px;
            }

            .login-box h1 {
                font-size: 20px;
            }

            input, button {
                font-size: 15px;
                padding: 15px;
            }
        }
    </style>
</head>

<body>

    <div class="login-box">

        <h1>Login Admin</h1>
        <div class="subtitle">Acesso exclusivo do administrador</div>

        <input type="email" id="email" placeholder="Digite o email">

        <input type="password" id="senha" placeholder="Digite a senha">

        <button id="btnLogin">Entrar</button>

    </div>

    <script type="module" src="login.js"></script>

</body>

</html>
